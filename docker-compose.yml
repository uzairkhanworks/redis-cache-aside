version: "3.8"

services:
  app:
    build: .
    container_name: redis-cache-app
    ports:
      - "8000:8000"
    depends_on:
      - mongo
      - redis
    environment:
      - MONGO_URI=mongodb://mongo:27017/redis-cache-aside
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    restart: always

  mongo:
    image: mongo:latest
    container_name: mongo-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:latest
    container_name: redis-cache
    ports:
      - "6379:6379"

volumes:
  mongo-data: